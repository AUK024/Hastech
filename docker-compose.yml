services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hascelik_mail}
      POSTGRES_USER: ${POSTGRES_USER:-hascelik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hascelik}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  screenshot-runner:
    image: mcr.microsoft/playwright:v1.54.2-jammy
    working_dir: /workspace/frontend
    volumes:
      - ./frontend:/workspace/frontend
    network_mode: host
    command: sh -c "npm install && npx playwright install chromium && npm run screenshot"
    profiles: ["screenshots"]

volumes:
  pg_data:
